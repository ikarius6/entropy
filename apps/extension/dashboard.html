<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Entropy Dashboard</title>
    <link rel="stylesheet" href="./src/dashboard/styles.css" />
  </head>
  <body>
    <main class="dashboard">
      <h1>Entropy Node Dashboard</h1>
      <div class="toolbar">
        <button id="refresh" type="button">Refresh</button>
        <button id="load-pubkey" type="button">Load Public Key</button>
      </div>

      <section class="settings-card">
        <h2>Node identity</h2>
        <label for="import-privkey">Import private key (hex)</label>
        <div class="settings-row">
          <input id="import-privkey" type="password" placeholder="64-char hex private key" />
          <button id="import-keypair" type="button">Import</button>
        </div>
        <div class="settings-row" style="margin-top: 0.5rem;">
          <button id="export-identity" type="button">Export Identity</button>
          <label class="file-import-label" for="import-identity-file">Import from File</label>
          <input id="import-identity-file" type="file" accept=".json" style="display:none" />
        </div>
        <p id="key-status">Public key: loading...</p>
      </section>

      <section class="settings-card">
        <h2>Relay settings</h2>
        <div class="settings-row">
          <input id="relay-url-input" type="text" placeholder="wss://relay.example.com" />
          <button id="add-relay" type="button">Add</button>
        </div>
        <ul id="relay-list" class="inventory-list"></ul>
        <p id="relay-status"></p>
      </section>

      <section class="settings-card">
        <h2>Seeding</h2>
        <div class="settings-row seeding-row">
          <label for="seeding-toggle" class="toggle-label">Background seeding active</label>
          <input id="seeding-toggle" type="checkbox" checked />
        </div>
        <p id="seeding-status"></p>
      </section>

      <section class="inventory-card">
        <h2>Chunk inventory</h2>
        <p id="inventory-summary">Loading inventory...</p>
        <div class="quota-track" aria-label="Storage quota">
          <div id="quota-fill" class="quota-fill"></div>
        </div>
        <ul id="root-inventory" class="inventory-list"></ul>
        <details class="inventory-details">
          <summary>Chunk details</summary>
          <ul id="chunk-inventory" class="inventory-list compact"></ul>
        </details>
      </section>

      <pre id="status">Loading...</pre>
    </main>
    <script type="module" src="./src/dashboard/main.ts"></script>
  </body>
</html>
